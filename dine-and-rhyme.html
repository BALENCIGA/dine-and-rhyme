<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dine & Rhyme">
<title>Dine & Rhyme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
    font-weight: 600;
  }

  /* 写真選択エリア */
  .photo-area {
    border: 2px dashed #333;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .photo-area:active { border-color: #e74c3c; }
  .photo-area.has-photos { border-color: #27ae60; border-style: solid; }
  .photo-area p { color: #888; font-size: 16px; }
  .photo-area .icon { font-size: 40px; margin-bottom: 8px; }
  .photo-count { color: #27ae60; font-size: 18px; font-weight: bold; }

  .photo-preview {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 0;
    margin-top: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .photo-preview img {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
  }

  input[type="file"] { display: none; }

  input[type="text"], textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #1a1a1a;
    color: #f0f0f0;
    font-size: 16px;
    margin-bottom: 20px;
    -webkit-appearance: none;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: #e74c3c;
  }
  textarea {
    height: 80px;
    resize: none;
    font-family: inherit;
  }

  /* APIキー設定 */
  .api-key-section {
    margin-bottom: 20px;
  }
  .api-key-toggle {
    color: #666;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }
  .api-key-input {
    margin-top: 8px;
    display: none;
  }
  .api-key-input.show { display: block; }
  .api-key-saved { color: #27ae60; font-size: 13px; }

  /* 生成ボタン */
  .generate-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 24px;
    transition: opacity 0.2s;
  }
  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .generate-btn:active:not(:disabled) { opacity: 0.8; }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 40px 0;
    display: none;
  }
  .loading.show { display: block; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #333;
    border-top-color: #e74c3c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #888; font-size: 14px; }

  /* 結果表示 */
  .result {
    display: none;
    margin-bottom: 24px;
  }
  .result.show { display: block; }
  .result-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 20px;
    white-space: pre-wrap;
    line-height: 1.7;
    font-size: 15px;
    margin-bottom: 12px;
    max-height: 500px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .copy-btn {
    width: 100%;
    padding: 14px;
    border: 2px solid #e74c3c;
    border-radius: 14px;
    background: transparent;
    color: #e74c3c;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:active { background: #e74c3c; color: white; }
  .copy-btn.copied {
    background: #27ae60;
    border-color: #27ae60;
    color: white;
  }

  /* エラー */
  .error {
    background: #2d1515;
    border: 1px solid #e74c3c;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: none;
    font-size: 14px;
    color: #ff8888;
  }
  .error.show { display: block; }
</style>
</head>
<body>

<h1>Dine & Rhyme</h1>
<p class="subtitle">食の写真にライムを添えて</p>

<!-- 写真選択 -->
<div class="photo-area" id="photoArea" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📸</div>
  <p>タップして写真を選択</p>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<!-- 店名 -->
<div class="section-label">店名</div>
<input type="text" id="shopName" placeholder="例: Pizza Marumo">

<!-- 感想・AIへのヒント -->
<div class="section-label">感想やAIに伝えたいこと</div>
<textarea id="comment" placeholder="例: 席取るの大変だった、食べすぎて動けない、大将面白い"></textarea>

<!-- 設定 -->
<div class="api-key-section">
  <span class="api-key-toggle" id="apiKeyToggle" onclick="toggleApiKey()">
    設定
  </span>
  <span class="api-key-saved" id="apiKeySaved"></span>
  <div class="api-key-input" id="apiKeyInput">
    <div class="section-label" style="margin-top:8px">APIキー</div>
    <input type="text" id="apiKey" placeholder="Gemini APIキーを入力" style="margin-bottom:8px">
    <div class="section-label">モデル</div>
    <select id="modelSelect" style="width:100%;padding:12px;border:1px solid #333;border-radius:12px;background:#1a1a1a;color:#f0f0f0;font-size:16px;margin-bottom:8px;-webkit-appearance:none;">
      <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro（最高品質・推奨）</option>
      <option value="gemini-3-flash">Gemini 3 Flash（高速・高品質）</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
    </select>
    <div style="font-size:12px;color:#666;margin-bottom:12px">
      3.1 Proが最高品質。3 Flashも高品質で高速。
    </div>
  </div>
</div>

<!-- 生成ボタン -->
<button class="generate-btn" id="generateBtn" onclick="generate()">
  ライムを生成する
</button>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>ライムを紡いでいます...</p>
</div>

<!-- エラー -->
<div class="error" id="error"></div>

<!-- 結果 -->
<div class="result" id="result">
  <div class="section-label">生成されたキャプション</div>
  <div class="result-box" id="resultText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyResult()">
    クリップボードにコピー
  </button>
</div>

<script>
// --- 状態管理 ---
let selectedFiles = [];

// --- 初期化 ---
document.addEventListener('DOMContentLoaded', () => {
  const savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
    document.getElementById('apiKeySaved').textContent = '(設定済み)';
  }
});

// --- APIキー表示切替 ---
function toggleApiKey() {
  const el = document.getElementById('apiKeyInput');
  el.classList.toggle('show');
}

// --- APIキー保存 ---
document.getElementById('apiKey').addEventListener('change', (e) => {
  const key = e.target.value.trim();
  if (key) {
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('apiKeySaved').textContent = '(保存しました)';
  }
});

// --- 写真選択 ---
document.getElementById('fileInput').addEventListener('change', (e) => {
  selectedFiles = Array.from(e.target.files);
  updatePhotoArea();
});

function updatePhotoArea() {
  const area = document.getElementById('photoArea');
  if (selectedFiles.length === 0) {
    area.innerHTML = '<div class="icon">📸</div><p>タップして写真を選択</p>';
    area.classList.remove('has-photos');
    return;
  }

  area.classList.add('has-photos');
  let html = `<div class="photo-count">${selectedFiles.length}枚選択済み</div>`;
  html += '<div class="photo-preview">';
  selectedFiles.forEach(file => {
    const url = URL.createObjectURL(file);
    html += `<img src="${url}" alt="photo">`;
  });
  html += '</div>';
  area.innerHTML = html;
}

// --- 画像をBase64に変換 ---
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    // 画像をリサイズして送信量を削減（長辺1024px以下）
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 1024;
      let { width, height } = img;

      if (width > maxSize || height > maxSize) {
        if (width > height) {
          height = Math.round(height * maxSize / width);
          width = maxSize;
        } else {
          width = Math.round(width * maxSize / height);
          height = maxSize;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      const base64 = dataUrl.split(',')[1];
      resolve(base64);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

// --- プロンプト ---
function buildPrompt(shopName, comment) {
  return `You are the dedicated caption writer for the Instagram account "dine_and_rhyme".

Account concept:
Food × Rap × Instagram

Your job:
Turn food photos and short food notes into highly rap-able Instagram captions.

This account must feel unique:
- stylish
- funny
- self-aware
- food-obsessed
- nightlife-adjacent
- playful, never stiff
- confident, never arrogant

The most important thing is FLOW.
The caption must feel like something people want to mouth along to.
If a line is hard to say aloud, it is not good enough.

Core priority:
FLOW > RHYME > VIBE > DESCRIPTION

Non-negotiable tone rules:
- Respect the restaurant, chef, staff, and craft.
- Humor should come from the narrator, not from mocking the restaurant.
- Self-deprecating twists are important.
- Even when the restaurant is expensive, famous, exclusive, or luxurious, never sound like you are bragging.
- Do not flex price, status, or access.
- Focus on craft, texture, aroma, mood, and your own funny or human reaction.
- The vibe should be: "respect the shop, clown myself a little."

Narrator voice:
- a food-loving night owl
- sometimes drinks too much
- witty and self-aware
- loves bars, restaurants, and late-night food
- occasionally has "no memory but the photo exists" energy
- playful, but still sharp

=== INPUT ===
Restaurant: ${shopName}
User notes: ${comment}
(Photos are attached — observe every dish carefully)

Japanese rap rules:
- Write exactly 8 lines.
- Each line must be short, speakable, and rhythmic.
- Prefer one-breath lines.
- Use natural spoken Japanese, not stiff written Japanese.
- Use rhyme, sound repetition, vowel echo, internal rhyme, and bounce.
- Avoid unnatural phrasing just to force a rhyme.
- A little English is allowed only if it improves groove.
- Make the Japanese feel catchy enough to casually say out loud.

Japanese flow target:
- short line
- medium line
- punch
- punch
- then escalate
- then land with a witty or self-deprecating twist

English rap rules:
- Write exactly 8 lines.
- Make it rhyme clearly.
- Use hip-hop phrasing, internal rhyme, end rhyme, and punchy cadence.
- Do not make the English a stiff literal translation.
- Match the energy and swagger of the Japanese.
- Make it smooth enough to sound performable.

Humor and ending rules:
- The last 1–2 lines should often contain a wink, self-own, or playful twist.
- Examples of acceptable humor:
  - drank more than ate
  - forgot what happened but the photo remains
  - won but somehow still lost
  - came for elegance, ended up being greedy
  - tried to act cool, but food destroyed self-control
- The restaurant should still come out respected.

Grounding rules:
- Use only what is visible in the photos or explicitly stated by the user.
- Do not invent ingredients, awards, cooking methods, wood fire, charcoal, wine details, chef details, or restaurant facts unless the user states them or they are visually obvious.
- If uncertain, stay sensory and general rather than making false specifics.
- Accuracy matters.

Output rules:
- Output only the final Instagram-ready text.
- No explanations.
- No titles.
- No labels.
- No section headers.
- No separators.
- No quotation marks around sections.
- Make it immediately copy-paste ready.

Required output format:
1. Japanese rap: exactly 8 lines
2. Blank line
3. English rap: exactly 8 lines
4. Blank line
5. English hashtags: exactly 5 hashtags

Hashtag rules:
- Exactly 5 hashtags, all in English.
- Keep them catchy, discoverable, and relevant.
- Mix food, mood, humor, and vibe.
- Do not make them generic spam.

Default structure guidance:
- scene
- food detail
- texture/aroma/sound
- vibe
- reaction
- drink or setting if relevant
- self-aware twist
- strong landing

Quality control before answering:
Silently review the draft and rewrite if needed until all are true:
- The Japanese flows smoothly out loud.
- The Japanese feels catchy, not just descriptive.
- There is audible rhyme or sound play.
- The English rhymes naturally.
- The restaurant is respected.
- The narrator has personality.
- There is at least a slight humorous or self-deprecating turn.
- The caption does not sound like luxury bragging.
- All provided facts are accurate.
- The result is clean and ready to paste into Instagram.

If the user gives a special format request later (for example: story only, Japanese only, 16 bars, shorter version, no English, etc.), follow that request while preserving the same tone, flow, respect, humor, and self-aware style.

Write like a skilled underground rapper who genuinely loves food.`;
}

// --- 生成 ---
async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim() || localStorage.getItem('gemini_api_key');
  const shopName = document.getElementById('shopName').value.trim();
  const comment = document.getElementById('comment').value.trim();

  // バリデーション
  if (!apiKey) {
    showError('APIキーを設定してください');
    toggleApiKey();
    return;
  }
  if (selectedFiles.length === 0) {
    showError('写真を選択してください');
    return;
  }
  if (!shopName) {
    showError('店名を入力してください');
    return;
  }

  // APIキーを保存
  localStorage.setItem('gemini_api_key', apiKey);

  // UI更新
  hideError();
  document.getElementById('result').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('generateBtn').disabled = true;

  try {
    // 画像をBase64変換（最大10枚）
    const filesToProcess = selectedFiles.slice(0, 10);
    const base64Images = await Promise.all(filesToProcess.map(f => fileToBase64(f)));

    // APIリクエスト構築
    const parts = [];
    base64Images.forEach(b64 => {
      parts.push({
        inline_data: {
          mime_type: 'image/jpeg',
          data: b64
        }
      });
    });
    parts.push({ text: buildPrompt(shopName, comment) });

    const requestBody = {
      contents: [{ parts: parts }],
      generationConfig: {
        temperature: 1.0,
        maxOutputTokens: 4096
      }
    };

    // Gemini API呼び出し（Pro を優先、ダメなら Flash にフォールバック）
    const model = document.getElementById('modelSelect').value;
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
      }
    );

    const data = await response.json();

    if (data.error) {
      throw new Error(data.error.message || 'APIエラーが発生しました');
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) {
      throw new Error('レスポンスからテキストを取得できませんでした');
    }

    // 結果表示
    document.getElementById('resultText').textContent = text;
    document.getElementById('result').classList.add('show');
    document.getElementById('copyBtn').textContent = 'クリップボードにコピー';
    document.getElementById('copyBtn').classList.remove('copied');

    // 結果までスクロール
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    showError(err.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('generateBtn').disabled = false;
  }
}

// --- コピー ---
async function copyResult() {
  const text = document.getElementById('resultText').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'クリップボードにコピー';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    // フォールバック: テキスト選択
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('resultText'));
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    showError('自動コピーできませんでした。テキストを選択したので手動でコピーしてください。');
  }
}

// --- エラー表示 ---
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('error').classList.remove('show');
}
</script>

</body>
</html>
